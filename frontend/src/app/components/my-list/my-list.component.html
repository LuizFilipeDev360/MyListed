@if (UserMediaList.length > 0) {
  <div class="container">
    @for (item of UserMediaList; track item.mediaId) {
      <div class="media" (click)="goToMedia(item.mediaId)" style="cursor: pointer;">
        <h3>{{ item.titulo }}</h3>
        <img [src]="item.imageUrl || 'https://upload.wikimedia.org/wikipedia/commons/1/14/No_Image_Available.jpg'" style="width: 150px; height: auto;" />
      </div>
    }
  </div>  
}@else {
  <h1>MyList vazia</h1>
}
