<p>my-list works!</p>

<div *ngFor="let item of UserMediaList">
  <h3>{{ item.titulo }}</h3>
  <p>{{ item.rating }}</p>
</div>

<br><br>
<h1>Para</h1>
<br><br>
@for (item of UserMediaList; track item.mediaId) {
  <div (click)="goToMedia(item.mediaId)" style="cursor: pointer;">
    <h3>{{ item.titulo }}</h3>
    <img [src]="item.imageUrl || 'https://upload.wikimedia.org/wikipedia/commons/1/14/No_Image_Available.jpg'" style="width: 150px; height: auto;" />
  </div>
}
