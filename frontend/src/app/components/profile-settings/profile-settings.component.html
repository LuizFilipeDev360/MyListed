<form (ngSubmit)="updateUser()" #updateUserForm="ngForm">

  <div>
    <label>UserName</label>
    <input
      class="barra" 
      type="text" 
      name="userName" 
      [(ngModel)]="userName" 
      required 
    />
  </div>

  <button type="submit" [disabled]="updateUserForm.invalid">
    Mudar
  </button>

</form>

<button class="sair" (click)="logout()">Sair</button>
