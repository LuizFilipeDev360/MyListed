<form [class.register-error]="hasRegisterError"  (ngSubmit)="register()" #registerForm="ngForm">

  <div>
    <label>Email</label>
    <input 
      class="barra"
      type="email" 
      name="email" 
      [(ngModel)]="email" 
      required 
    />
  </div>

  <div>
    <label>Senha</label>
    <input 
      class="barra"
      [class.error]="passwordMismatch"
      type="password" 
      name="password" 
      [(ngModel)]="password" 
      required 
    />
  </div>

  <div>
    <label>Confirmar Senha</label>
    <input 
      class="barra"
      [class.error]="passwordMismatch"
      type="password" 
      name="confirmPassword" 
      [(ngModel)]="confirmPassword" 
      required 
    />
  </div>

  <button type="submit" [disabled]="registerForm.invalid">
    Cadastrar
  </button>

</form>

<a routerLink="/login">Ja possui uma Conta?</a>
